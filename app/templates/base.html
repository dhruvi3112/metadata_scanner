<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Metadata Scanner{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Unified Navbar for logged in or out -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i data-lucide="shield"></i> Scanner
        </a>
        
        <!-- Hamburger Menu Button -->
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
            <i data-lucide="menu"></i>
        </button>

        <div class="nav-links" id="nav-links">
            {% if session.get('user_id') %}
                <a href="/"><i data-lucide="home"></i> Home</a>
                <a href="/history"><i data-lucide="history"></i> History</a>
                <a href="/settings/password"><i data-lucide="user"></i> Account</a>
                {% if session.get('role') == 'admin' %}
                    <a href="/admin/users"><i data-lucide="users"></i> Users</a>
                    <a href="/admin/settings"><i data-lucide="settings"></i> System Settings</a>
                {% endif %}
                <a href="/logout" class="btn btn-danger nav-logout"><i data-lucide="log-out"></i> Logout</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}">Login</a>
                <a href="{{ url_for('auth.register') }}" class="btn btn-primary nav-auth-btn">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container fade-in {% block container_class %}center-content{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <!-- Initialize Lucide Icons & Mobile Menu -->
    <script>
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menu-toggle');
        const navLinks = document.getElementById('nav-links');

        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                
                // Toggle icon between menu and x
                const icon = menuToggle.querySelector('i');
                if (navLinks.classList.contains('active')) {
                    icon.setAttribute('data-lucide', 'x');
                } else {
                    icon.setAttribute('data-lucide', 'menu');
                }
                lucide.createIcons();
            });
        }
    </script>
</body>
</html>
