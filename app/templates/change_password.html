{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="glass-card" style="width: 100%; max-width: 480px; margin: 0 auto;">
    <div class="text-center mb-4">
        <div style="display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; background: rgba(99, 102, 241, 0.1); margin-bottom: 15px;">
            <i data-lucide="lock" style="color: var(--primary-color);"></i>
        </div>
        <h2 class="title-gradient">Change Password</h2>
        <p>Update your account security credentials</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">
        <i data-lucide="alert-circle"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">
        <i data-lucide="check-circle"></i> {{ success }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label class="form-label">Current Password</label>
            <div style="position: relative;">
                <input type="password" name="current_password" id="current_password" class="form-control" placeholder="Enter current password" required>
                <button type="button" onclick="togglePassword('current_password', 'eye-curr')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                    <i data-lucide="eye" id="eye-curr" style="width: 18px;"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">New Password</label>
            <div style="position: relative;">
                <input type="password" name="new_password" id="new_password" class="form-control" placeholder="Enter new password" required>
                <button type="button" onclick="togglePassword('new_password', 'eye-new')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                    <i data-lucide="eye" id="eye-new" style="width: 18px;"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <div style="position: relative;">
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Re-enter new password" required>
                <button type="button" onclick="togglePassword('confirm_password', 'eye-conf')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                    <i data-lucide="eye" id="eye-conf" style="width: 18px;"></i>
                </button>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary btn-w-100">
                <i data-lucide="refresh-cw"></i> Update Password
            </button>
        </div>
    </form>
</div>

<script>
function togglePassword(inputId, iconId) {
    const pwd = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
    } else {
        pwd.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
}
</script>
{% endblock %}
